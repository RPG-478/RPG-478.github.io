<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archy - AI Architecture Diagrams</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // Robust process shim for browser environment
        window.process = {
            env: { API_KEY: "" },
            version: 'v16.0.0',
            versions: {},
            platform: 'browser',
            nextTick: (cb) => setTimeout(cb, 0),
            cwd: () => '/'
        };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }
        .pattern-grid { background-image: radial-gradient(#e2e8f0 1.2px, transparent 1.2px); background-size: 24px 24px; }
        .startup-loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .startup-loader.hidden { opacity: 0; pointer-events: none; }
        .error-box {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            border-radius: 0.75rem;
            color: #dc2626;
            font-size: 0.875rem;
            max-width: 80%;
            text-align: center;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.474.0?deps=react@18.3.1",
    "@google/genai": "https://esm.sh/@google/genai@0.2.1",
    "mermaid": "https://esm.sh/mermaid@11.4.0",
    "jszip": "https://esm.sh/jszip@3.10.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body>
    <div id="startup-screen" class="startup-loader">
        <div class="flex flex-col items-center gap-4">
            <div id="loader-spinner" class="w-12 h-12 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
            <p id="loader-text" class="text-slate-500 font-bold text-sm tracking-widest uppercase">Archy を起動中...</p>
            <div id="error-box" class="error-box">
                <p class="font-bold mb-1">起動中にエラーが発生しました</p>
                <p id="error-detail" class="text-xs opacity-80"></p>
                <button onclick="location.reload()" class="mt-3 px-4 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold shadow-lg">再読み込みする</button>
            </div>
        </div>
    </div>

    <script>
        // Global error listener to handle module loading failures
        window.addEventListener('error', (event) => {
            const spinner = document.getElementById('loader-spinner');
            const text = document.getElementById('loader-text');
            const errorBox = document.getElementById('error-box');
            const errorDetail = document.getElementById('error-detail');

            if (spinner && errorBox) {
                spinner.style.display = 'none';
                text.textContent = 'エラーが発生しました';
                errorBox.style.display = 'block';
                errorDetail.textContent = event.message || 'モジュールの読み込みに失敗した可能性があります。';
            }
        });

        // Timeout warning
        setTimeout(() => {
            const loader = document.getElementById('startup-screen');
            if (loader && !loader.classList.contains('hidden')) {
                console.warn("Startup is taking longer than expected...");
            }
        }, 8000);
    </script>

    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
